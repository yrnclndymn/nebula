name: CI

on:
  push:
    branches: [main]
  pull_request:
  # Merge-queue entries: required checks must report on the queue's merge
  # commits or queued PRs can never merge.
  merge_group:

jobs:
  backend:
    name: backend — lint + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      neo4j:
        image: neo4j:5
        env:
          NEO4J_AUTH: neo4j/nebula-local-dev
        ports:
          - 7687:7687
        options: >-
          --health-cmd "cypher-shell -u neo4j -p nebula-local-dev 'RETURN 1'"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 12
          --health-start-period 40s
    env:
      NEO4J_URI: bolt://localhost:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: nebula-local-dev
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so diff-coverage can diff changed lines against main.
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: uv sync --frozen
      - name: Fetch main for diff base
        # fetch-depth:0 already brings all branches on PRs, but be explicit so the
        # diff base exists on push/merge_group runs too.
        working-directory: ${{ github.workspace }}
        run: git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main || true
      - name: Lint (ruff + tooling selftests)
        # Run the repo's `make lint` so ruff, the wave_status selftest, and (once
        # #103 lands) the import-linter gate all run in CI, not just locally.
        working-directory: ${{ github.workspace }}
        run: make lint
      - name: Apply graph schema
        run: uv run python -m app.graph.schema
      - name: Test (pytest + coverage)
        run: uv run pytest -q --cov=app --cov-report=xml --cov-report=term-missing:skip-covered
      - name: Diff coverage gate (changed lines vs main)
        # Fail when NEW/CHANGED lines are under-covered — "no worse than main"
        # without a stored baseline. Reports the uncovered changed lines.
        run: uv run diff-cover coverage.xml --compare-branch origin/main --fail-under 80

  frontend:
    name: frontend — lint + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint (oxlint)
        run: npm run lint
      - name: Build (tsc + vite)
        run: npm run build
      - name: Test (vitest)
        run: npm test
