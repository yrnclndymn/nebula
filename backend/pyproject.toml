[project]
name = "nebula-backend"
version = "0.1.0"
description = "Nebula — agentic research graph: FastAPI backend + ADK research agents over Neo4j"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.32.0",
    "neo4j>=5.26.0",
    "pydantic-settings>=2.6.0",
    "python-dotenv>=1.0.0",
    "google-adk>=1.25.0",
    "ddgs>=9.14.4",
    "beautifulsoup4>=4.15.0",
    "lxml>=6.1.1",
    "requests>=2.34.2",
    "mcp>=1.28.1",
    "google-cloud-tasks>=2.23.0",
]

[dependency-groups]
dev = [
    "pytest>=8.3.0",
    "httpx>=0.27.0",
    "ruff>=0.8.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
line-length = 100

[tool.uv]
package = false
