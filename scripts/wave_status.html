<!doctype html>
<!--
  Wave status — live view over wave-status.json (produced by wave_status.py).
  Self-contained: no CDN, no build step. Serve this directory and open the page:

      make wave-watch                             # keeps wave-status.json fresh (loop)
      cd scripts && python3 -m http.server 8777   # then open localhost:8777/wave_status.html

  Two processes: one keeps wave-status.json fresh (make wave-watch), one serves
  the files (http.server). The page polls wave-status.json every 10s.
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wave status</title>
  <style>
    :root {
      --bg: #0f1115; --panel: #171a21; --panel2: #1d212b; --border: #2a2f3a;
      --fg: #e6e9ef; --muted: #8b93a3; --accent: #6ea8fe;
      --pass: #35c26a; --fail: #f2555a; --pending: #e0a83b; --none: #565d6b;
      --anom-bg: #3a2417; --anom-border: #e08a3b; --anom-fg: #ffcf9e;
      --conflict-bg: #3a1720; --conflict-border: #f2555a; --conflict-fg: #ffb3bb;
      --silent-bg: #2a1f3a; --silent-border: #b18bff; --silent-fg: #d8c6ff;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f5f6f8; --panel: #ffffff; --panel2: #f0f2f5; --border: #d9dde4;
        --fg: #1b1f27; --muted: #626a78; --accent: #2f6fe0;
        --pass: #1a9e4b; --fail: #d33a3f; --pending: #b9791a; --none: #9aa1ad;
        --anom-bg: #fdefe0; --anom-border: #c8781f; --anom-fg: #7a4410;
        --conflict-bg: #fde3e6; --conflict-border: #d33a3f; --conflict-fg: #8a1d22;
        --silent-bg: #efe6fd; --silent-border: #7d52d6; --silent-fg: #4b2a91;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--fg);
      font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    header {
      display: flex; align-items: baseline; gap: 1rem; flex-wrap: wrap;
      padding: 1rem 1.25rem; border-bottom: 1px solid var(--border);
      position: sticky; top: 0; background: var(--bg); z-index: 2;
    }
    h1 { font-size: 1.05rem; margin: 0; font-weight: 650; letter-spacing: .2px; }
    .meta { color: var(--muted); font-size: .82rem; }
    .meta b { color: var(--fg); font-weight: 600; }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%;
           background: var(--pass); margin-right: .35rem; vertical-align: middle; }
    .dot.stale { background: var(--fail); }
    main { padding: 1rem 1.25rem 3rem; }
    .wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 760px; }
    th {
      text-align: left; font-size: .72rem; text-transform: uppercase;
      letter-spacing: .06em; color: var(--muted); font-weight: 600;
      padding: .35rem .6rem; border-bottom: 1px solid var(--border);
    }
    td { padding: .55rem .6rem; border-bottom: 1px solid var(--border);
         vertical-align: top; }
    tr:hover td { background: var(--panel); }
    .story-id { font-weight: 700; font-size: 1rem; }
    .slug { color: var(--muted); font-size: .8rem; }
    .branch { font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
              font-size: .78rem; color: var(--fg); }
    .wt { color: var(--muted); font-size: .72rem; margin-top: .15rem; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .pill {
      display: inline-block; padding: .12rem .5rem; border-radius: 999px;
      font-size: .72rem; font-weight: 600; border: 1px solid transparent;
      white-space: nowrap;
    }
    .pill.pass { color: var(--pass); border-color: var(--pass); }
    .pill.fail { color: var(--fail); border-color: var(--fail); }
    .pill.pending { color: var(--pending); border-color: var(--pending); }
    .pill.none, .pill.muted { color: var(--muted); border-color: var(--border); }
    .checks { display: flex; flex-direction: column; gap: .2rem; }
    .check { font-size: .74rem; display: flex; align-items: center; gap: .35rem; }
    .sw { width: 9px; height: 9px; border-radius: 2px; flex: 0 0 auto; }
    .sw.pass { background: var(--pass); }
    .sw.fail { background: var(--fail); }
    .sw.pending { background: var(--pending); }
    .sw.skipping, .sw.cancel { background: var(--none); }
    /* anomaly badges — deliberately NOT plain red/green: patterned + iconed */
    .anom {
      display: inline-flex; align-items: center; gap: .3rem;
      padding: .12rem .5rem; border-radius: 6px; font-size: .72rem;
      font-weight: 700; margin: .1rem .25rem .1rem 0; border: 1px dashed;
    }
    .anom.silent { background: var(--silent-bg); color: var(--silent-fg);
                   border-color: var(--silent-border); }
    .anom.conflict { background: var(--conflict-bg); color: var(--conflict-fg);
                     border-color: var(--conflict-border); }
    .anom.pend { background: var(--anom-bg); color: var(--anom-fg);
                 border-color: var(--anom-border); }
    tr.has-anom td { background: color-mix(in srgb, var(--anom-border) 8%, transparent); }
    .verdict { font-size: .74rem; }
    .verdict.approve { color: var(--pass); }
    .verdict.needs-changes { color: var(--fail); font-weight: 700; }
    .verdict.placeholder, .verdict.unclear { color: var(--pending); }
    .vtext { color: var(--muted); font-size: .7rem; margin-top: .15rem;
             max-width: 26ch; }
    .merged { color: var(--pass); font-weight: 700; }
    .banner { padding: .6rem .9rem; margin-bottom: 1rem; border-radius: 8px;
              border: 1px solid var(--fail); color: var(--fail);
              background: color-mix(in srgb, var(--fail) 10%, transparent); }
    .empty { color: var(--muted); padding: 2rem 0; text-align: center; }
    .legend { display: flex; gap: 1rem; flex-wrap: wrap; margin-top: .6rem;
              color: var(--muted); font-size: .72rem; }
  </style>
</head>
<body>
  <header>
    <h1>Wave status</h1>
    <span class="meta"><span id="livedot" class="dot"></span><span id="status">loading…</span></span>
    <span class="meta" id="repo"></span>
    <span class="meta" id="counts"></span>
  </header>
  <main>
    <div id="banner"></div>
    <div class="wrap">
      <table>
        <thead>
          <tr>
            <th>Story</th><th>Branch / worktree</th><th>PR</th>
            <th>CI checks</th><th>Review</th><th>State</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
    <div id="emptyMsg"></div>
    <div class="legend">
      <span>Anomalies (dashed): <span class="anom silent">◐ silent review</span>
      <span class="anom conflict">✕ conflicted</span>
      <span class="anom pend">◔ checks pending</span></span>
    </div>
  </main>

  <script>
    "use strict";
    const POLL_MS = 10000;
    const STALE_MS = 45000; // json older than this => flag the snapshot loop is down
    const $ = (id) => document.getElementById(id);

    function esc(s) {
      return String(s == null ? "" : s).replace(/[&<>"']/g,
        (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    }

    function checksCell(story) {
      if (story.pr && story.pr.merged) return '<span class="pill muted">—</span>';
      if (!story.checks || story.checks.length === 0) {
        const s = story.checks_state || "none";
        return `<span class="pill ${s}">${s === "none" ? "no checks" : s}</span>`;
      }
      const rows = story.checks.map((c) => {
        const b = esc(c.bucket || "pending");
        return `<div class="check"><span class="sw ${b}"></span>${esc(c.name)}</div>`;
      }).join("");
      return `<div class="checks">${rows}</div>`;
    }

    function reviewCell(story) {
      const r = story.review;
      if (!r) {
        if (story.anomalies && story.anomalies.review_silent) return "";
        return '<span class="verdict muted">—</span>';
      }
      const v = esc(r.verdict || "unclear");
      return `<div class="verdict ${v}">${v}</div>` +
             (r.text ? `<div class="vtext">${esc(r.text)}</div>` : "");
    }

    function anomBadges(story) {
      const a = story.anomalies || {};
      const out = [];
      if (a.conflicted) out.push('<span class="anom conflict">✕ conflicted — no checks</span>');
      if (a.review_silent) out.push('<span class="anom silent">◐ silent review</span>');
      if (a.checks_pending) out.push('<span class="anom pend">◔ checks pending</span>');
      return out.join(" ");
    }

    function stateCell(story) {
      const pr = story.pr;
      const badges = anomBadges(story);
      let base;
      if (!pr) base = '<span class="pill muted">local only</span>';
      else if (pr.merged) base = '<span class="merged">✓ merged</span>';
      else if (pr.state === "CLOSED") base = '<span class="pill fail">closed</span>';
      else if (story.checks_state === "fail") base = '<span class="pill fail">CI failed</span>';
      else if (story.checks_state === "pass") base = '<span class="pill pass">ready</span>';
      else base = '<span class="pill pending">in progress</span>';
      return base + (badges ? `<div style="margin-top:.35rem">${badges}</div>` : "");
    }

    function prCell(story) {
      const pr = story.pr;
      if (!pr) return '<span class="slug">no PR</span>';
      const st = esc(pr.state || "");
      const cls = pr.merged ? "pass" : pr.state === "OPEN" ? "pending" : "muted";
      return `<a href="${esc(pr.url)}" target="_blank" rel="noopener">#${esc(pr.number)}</a>` +
             ` <span class="pill ${cls}">${st.toLowerCase()}</span>` +
             (pr.mergeable === "CONFLICTING" ? ' <span class="pill fail">conflict</span>' : "");
    }

    function render(data) {
      $("repo").innerHTML = data.repo ? `<b>${esc(data.repo)}</b>` : "";
      const stories = data.stories || [];
      const merged = stories.filter((s) => s.pr && s.pr.merged).length;
      const anoms = stories.filter((s) => {
        const a = s.anomalies || {};
        return a.conflicted || a.review_silent || a.checks_pending;
      }).length;
      $("counts").innerHTML =
        `<b>${stories.length}</b> stories · <b>${merged}</b> merged` +
        (anoms ? ` · <b style="color:var(--pending)">${anoms}</b> need attention` : "");

      const tbody = $("rows");
      tbody.innerHTML = "";
      if (stories.length === 0) {
        $("emptyMsg").innerHTML = '<div class="empty">No feat/* branches or wave PRs found.</div>';
        return;
      }
      $("emptyMsg").innerHTML = "";
      for (const s of stories) {
        const tr = document.createElement("tr");
        const a = s.anomalies || {};
        if (a.conflicted || a.review_silent || a.checks_pending) tr.className = "has-anom";
        const wt = s.worktree ? `<div class="wt">${esc(s.worktree)}</div>` : "";
        tr.innerHTML =
          `<td><div class="story-id">${s.story == null ? "—" : "#" + esc(s.story)}</div>` +
            `<div class="slug">${esc(s.slug)}</div></td>` +
          `<td><div class="branch">${esc(s.branch)}</div>${wt}</td>` +
          `<td>${prCell(s)}</td>` +
          `<td>${checksCell(s)}</td>` +
          `<td>${reviewCell(s)}</td>` +
          `<td>${stateCell(s)}</td>`;
        tbody.appendChild(tr);
      }
    }

    async function poll() {
      try {
        const res = await fetch("wave-status.json?_=" + Date.now(), { cache: "no-store" });
        if (!res.ok) throw new Error("HTTP " + res.status);
        const data = await res.json();
        render(data);
        const gen = new Date(data.generated_at);
        const ageMs = Date.now() - gen.getTime();
        const stale = ageMs > STALE_MS;
        $("livedot").className = "dot" + (stale ? " stale" : "");
        $("status").textContent =
          `snapshot ${gen.toLocaleTimeString()} (${Math.round(ageMs / 1000)}s ago)`;
        $("banner").innerHTML = stale
          ? '<div class="banner">Snapshot is stale — is the loop running? <code>make wave-watch</code></div>'
          : (data.gh_available ? "" :
             '<div class="banner">gh unavailable — PR / check / review data is null.</div>');
      } catch (e) {
        $("livedot").className = "dot stale";
        $("status").textContent = "waiting for wave-status.json…";
        $("banner").innerHTML =
          '<div class="banner">Can\'t read wave-status.json (' + esc(e.message) +
          '). Run <code>make wave-status</code> and serve this dir with <code>python3 -m http.server</code>.</div>';
      }
    }

    poll();
    setInterval(poll, POLL_MS);
  </script>
</body>
</html>
